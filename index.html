<!DOCTYPE html>
<html>

<head>
    <title>My Personal Website</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            background-color: purple;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        header{
            background-color: black;
            padding: 20px;
        }

        .logo{
            width: 100px;
        }

        h1{
            margin-top: 10px;
        }

        .navbar{
            margin-top: 20px;
        }

        .navbar a{
            text-decoration: none;
            background-color: white;
            color: purple;
            padding: 14px 28px;
            margin: 10px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .navbar a:hover{
            background-color: yellow;
            color: black;
            transform: scale(1.1);
        }

        .main{
            margin-top: 50px;
        }

        .main img{
            width: 250px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px black;
        }

        .card{
            background-color: rgba(255,255,255,0.1);
            width: 70%;
            margin: auto;
            padding: 30px;
            margin-top: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 15px black;
        }

        footer{
            background-color: black;
            padding: 15px;
            margin-top: 50px;
        }

    </style>

</head>

<body>

    <header>

        <img src="images/logo.png" class="logo">

        <h1>MY PERSONAL WEBSITE</h1>

        <div class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="contact.html">Contact</a>
        </div>

    </header>

    <div class="main">

        <img src="images/myphoto.jpg">

        <div class="card">

            <h2>Hello, I am Nandy</h2>

            <p>
                Welcome to my personal website.
                I am a university student passionate about
                cybersecurity, digital forensics and web development.
            </p>

        </div>

    </div>

    <footer>
        © 2026 My Website
    </footer>

</body>

</html>
